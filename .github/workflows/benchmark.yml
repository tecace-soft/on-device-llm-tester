name: LLM Benchmark

on:
  workflow_dispatch:
    inputs:
      device_mode:
        description: 'Device selection mode'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - single
      parallel:
        description: 'Run devices in parallel'
        required: false
        default: false
        type: boolean

concurrency:
  group: llm-bench
  cancel-in-progress: false

jobs:
  benchmark:
    runs-on: [self-hosted, llm-bench]
    timeout-minutes: 240
    defaults:
      run:
        shell: powershell

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify ADB & discover devices
        id: discover
        run: |
          adb devices -l
          $found = adb devices | Select-String -Pattern '\bdevice$'
          $deviceCount = if ($found) { @($found).Count } else { 0 }
          echo "device_count=$deviceCount" >> $env:GITHUB_OUTPUT
          if ($deviceCount -eq 0) {
            Write-Error "No devices connected"
            exit 1
          }
          Write-Host "Found $deviceCount device(s)"

      - name: Sync models to all devices
        if: ${{ inputs.device_mode == 'all' }}
        env:
          PYTHONIOENCODING: utf-8
        run: python scripts/shuttle.py --all-devices

      - name: Run benchmark
        env:
          PYTHONIOENCODING: utf-8
        run: |
          if ("${{ inputs.device_mode }}" -eq "single") {
            python scripts/runner.py
          } elseif ("${{ inputs.parallel }}" -eq "true") {
            python scripts/runner.py --all-devices --parallel
          } else {
            python scripts/runner.py --all-devices
          }

      - name: Sync results from devices
        env:
          PYTHONIOENCODING: utf-8
        run: |
          if ("${{ inputs.device_mode }}" -eq "single") {
            python scripts/sync_results.py
          } elseif ("${{ inputs.parallel }}" -eq "true") {
            # Parallel mode: runner.py didn't sync, collect all here
            python scripts/sync_results.py --all-devices
          }
          # Sequential mode: runner.py already did per-device sync — skip

      - name: Ingest results to DB
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python scripts/ingest.py `
            --run-id ${{ github.run_id }} `
            --trigger manual `
            --commit-sha ${{ github.sha }} `
            --branch ${{ github.ref_name }}

      # ✨ Phase 4a — Response Validation (no API key, no external deps)
      - name: Validate responses
        env:
          PYTHONIOENCODING: utf-8
        run: python scripts/response_validator.py --run-id ${{ github.run_id }}

      - name: Flush WAL checkpoint
        if: always()
        run: |
          python -c @"
          import sqlite3, os
          db_path = os.path.join('api', 'data', 'llm_tester.db')
          if os.path.exists(db_path):
              con = sqlite3.connect(db_path)
              con.execute('PRAGMA wal_checkpoint(TRUNCATE)')
              con.close()
              print('WAL checkpoint complete')
          else:
              print('DB file not found, skipping checkpoint')
          "@

      - name: Upload DB artifact
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: llm-tester-db-${{ github.run_id }}
          path: api/data/llm_tester.db
          retention-days: 90

      - name: Upload runner logs (parallel mode)
        if: ${{ inputs.parallel == 'true' }}
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: runner-logs-${{ github.run_id }}
          path: logs/*.log
          retention-days: 30

      - name: Summary
        env:
          PYTHONIOENCODING: utf-8
        if: always()
        run: |
          "## Benchmark Complete" >> $env:GITHUB_STEP_SUMMARY
          "- Run ID: ${{ github.run_id }}" >> $env:GITHUB_STEP_SUMMARY
          "- Branch: ${{ github.ref_name }}" >> $env:GITHUB_STEP_SUMMARY
          "- Commit: ${{ github.sha }}" >> $env:GITHUB_STEP_SUMMARY
          "- Devices: ${{ steps.discover.outputs.device_count }}" >> $env:GITHUB_STEP_SUMMARY
          "- Mode: ${{ inputs.device_mode }}" >> $env:GITHUB_STEP_SUMMARY
          "- Parallel: ${{ inputs.parallel }}" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          "### DB Stats" >> $env:GITHUB_STEP_SUMMARY
          python scripts/ingest.py --summary-only >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          "### Validation" >> $env:GITHUB_STEP_SUMMARY
          python scripts/response_validator.py --summary-only >> $env:GITHUB_STEP_SUMMARY